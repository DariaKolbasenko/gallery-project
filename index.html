<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Галерея картин</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
    <h1>Выставка картин</h1>
  </header>

  <main class="container">
    <div class="gallery">
      
      <div class="card">
        <img src="img/painting1.jpg" alt="Картина 1" class="card-img" />
        <div class="card-overlay">
          <span class="card-text">Ирисы, Ван Гог</span>
        </div>
        <div class="card-actions">
          <button class="btn-like">♡</button>
          <button class="btn-favorite">□</button>
        </div>
      </div>

      <div class="card">
        <img src="img/painting2.jpg" alt="Картина 2" class="card-img" />
        <div class="card-overlay">
          <span class="card-text">Звёздная ночь, Ван Гог</span>
        </div>
        <div class="card-actions">
          <button class="btn-like">♡</button>
          <button class="btn-favorite">□</button>
        </div>
      </div>

      <div class="card">
        <img src="img/painting3.jpg" alt="Картина 3" class="card-img" />
        <div class="card-overlay">
          <span class="card-text">Впечатление, Моне</span>
        </div>
        <div class="card-actions">
          <button class="btn-like">♡</button>
          <button class="btn-favorite">□</button>
        </div>
      </div>

      <div class="card">
        <img src="img/painting4.jpg" alt="Картина 4" class="card-img" />
        <div class="card-overlay">
          <span class="card-text">Мона Лиза, да Винчи</span>
        </div>
        <div class="card-actions">
          <button class="btn-like">♡</button>
          <button class="btn-favorite">□</button>
        </div>
      </div>

      <div class="card">
        <img src="img/painting5.jpg" alt="Картина 5" class="card-img" />
        <div class="card-overlay">
          <span class="card-text">Афинская школа, Рафаэль</span>
        </div>
        <div class="card-actions">
          <button class="btn-like">♡</button>
          <button class="btn-favorite">□</button>
        </div>
      </div>

      <div class="card">
        <img src="img/painting6.jpg" alt="Картина 6" class="card-img" />
        <div class="card-overlay">
          <span class="card-text">Поле маков, Моне</span>
        </div>
        <div class="card-actions">
          <button class="btn-like">♡</button>
          <button class="btn-favorite">□</button>
        </div>
      </div>

    </div>
  </main>

  <footer>
    <p>Выполнила: Даша Колбасенко</p>
  </footer>
</body>
</html>
